name: Test before pull to master

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # cloning repo 
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.5

      # some dependency for player folder to be able to run tests
      - name: Install ALSA dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Run tests
        run: go test $(go list ./... | grep -v '/yt_dlp') # recursively in all directories except yt_dlp folder
